<!DOCTYPEhtml>
<html lang="en" class="darkScrollbars select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HoneyCare — Healthcare OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            500: '#f59e0b',
                            600: '#d97706',
                            DEFAULT: '#fbbf24',
                        },
                        glass: {
                            light: 'rgba(255, 255, 255, 0.45)',
                            dark: 'rgba(15, 23, 42, 0.75)'
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 25px rgba(251, 191, 36, 0.25)',
                        'sos': '0 0 40px rgba(239, 68, 68, 0.6)',
                        'premium': '0 8px 32px 0 rgba(0, 0, 0, 0.37)'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glassmorphism {
            backdrop-filter: blur(20px) saturate(190%);
            -webkit-backdrop-filter: blur(20px) saturate(190%);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        .safe-top {
            padding-top: env(safe-area-inset-top, 0px);
        }
        /* Native-feeling view transitions */
        .view-slide-in {
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.6; }
            50% { transform: scale(1.08); opacity: 0.9; }
            100% { transform: scale(0.95); opacity: 0.6; }
        }
        .animate-sos-pulse { animation: pulse-ring 1.8s infinite ease-in-out; }
        
        /* Hiding scrollbars smoothly */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#090d16] text-slate-100 min-h-screen flex flex-col antialiased selection:bg-brand selection:text-slate-900 pb-28">

    <div id="toast-container" class="fixed top-12 left-4 right-4 z-50 flex flex-col gap-3 pointer-events-none max-w-sm mx-auto"></div>

    <div id="active-sos-banner" class="hidden fixed top-20 left-4 right-4 glassmorphism bg-red-950/95 border border-red-500/50 p-4 rounded-2xl shadow-sos z-40 transition-all duration-300">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                <div>
                    <h4 class="font-bold text-red-200 text-xs tracking-wide">CRITICAL SOS ACTIVE</h4>
                    <p class="text-[11px] text-red-300/90" id="sos-status-text">Ambulance #HC-092 En Route (4 Mins)</p>
                </div>
            </div>
            <button onclick="cancelSOS()" class="text-[11px] px-3 py-1.5 bg-red-600 hover:bg-red-700 active:scale-95 text-white font-semibold rounded-xl transition">Cancel</button>
        </div>
    </div>

    <header class="sticky top-0 z-40 glassmorphism bg-[#0f172a]/80 border-b border-slate-800/60 safe-top">
        <div class="px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2.5" onclick="navigateTo('dashboard')">
                <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-brand-600 to-amber-400 flex items-center justify-center shadow-neon">
                    <span class="text-lg">🍯</span>
                </div>
                <div>
                    <span class="text-lg font-black tracking-tight text-white block">HoneyCare</span>
                    <span class="text-[8px] block uppercase font-bold text-brand tracking-widest -mt-1">Healthcare OS</span>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="triggerGlobalSOS()" class="bg-red-600 active:scale-95 text-white font-extrabold px-3 py-1.5 rounded-xl text-[11px] flex items-center gap-1.5 shadow-md shadow-red-900/40 transition-all">
                    <i class="fa-solid fa-circle-exclamation animate-pulse"></i> SOS
                </button>
                
                <div id="user-profile-widget" class="hidden items-center gap-2">
                    <div class="h-8 w-8 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-brand font-bold text-xs shadow-inner">
                        A
                    </div>
                    <button onclick="logout()" class="h-8 w-8 rounded-xl bg-slate-900 hover:bg-slate-800 text-slate-400 active:text-red-400 flex items-center justify-center border border-slate-800">
                        <i class="fa-solid fa-power-off text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 w-full max-w-xl mx-auto" id="view-root"></main>

    <nav id="app-dock" class="hidden fixed bottom-4 left-4 right-4 z-40 bg-slate-950/85 border border-slate-800/80 rounded-2xl glassmorphism shadow-premium p-1.5 items-center justify-around gap-1 safe-bottom">
        <button onclick="navigateTo('dashboard')" data-nav="dashboard" class="flex flex-col items-center gap-1 py-2 px-2.5 text-brand transition-all rounded-xl flex-1">
            <i class="fa-solid fa-columns text-base"></i>
            <span class="text-[9px] font-bold tracking-wide">Hub</span>
        </button>
        <button onclick="navigateTo('consultation')" data-nav="consultation" class="flex flex-col items-center gap-1 py-2 px-2.5 text-slate-400 transition-all rounded-xl flex-1">
            <i class="fa-solid fa-user-doctor text-base"></i>
            <span class="text-[9px] font-bold tracking-wide">Doctors</span>
        </button>
        <button onclick="navigateTo('pharmacy')" data-nav="pharmacy" class="flex flex-col items-center gap-1 py-2 px-2.5 text-slate-400 transition-all rounded-xl flex-1">
            <i class="fa-solid fa-capsules text-base"></i>
            <span class="text-[9px] font-bold tracking-wide">Store</span>
        </button>
        <button onclick="navigateTo('ai-assistant')" data-nav="ai-assistant" class="flex flex-col items-center gap-1 py-2 px-2.5 text-slate-400 transition-all rounded-xl flex-1 relative">
            <i class="fa-solid fa-brain text-base text-amber-400"></i>
            <span class="text-[9px] font-bold tracking-wide">HoneyAI</span>
            <span class="absolute top-1.5 right-4 h-1.5 w-1.5 bg-brand rounded-full"></span>
        </button>
        <button onclick="openMoreModulesMenu()" class="flex flex-col items-center gap-1 py-2 px-2.5 text-slate-400 transition-all rounded-xl flex-1">
            <i class="fa-solid fa-square-rss text-base"></i>
            <span class="text-[9px] font-bold tracking-wide">More</span>
        </button>
    </nav>

    <div id="more-modules-modal" class="fixed inset-0 bg-slate-950/95 z-50 p-4 hidden overflow-y-auto backdrop-blur-2xl transition-all duration-300 opacity-0 safe-top pb-12">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
                <div>
                    <h2 class="text-xl font-black text-white tracking-tight">Ecosystem Framework</h2>
                    <p class="text-slate-400 text-xs">Direct access link processing telemetry nodes</p>
                </div>
                <button onclick="closeMoreModulesMenu()" class="h-9 w-9 rounded-full bg-slate-800 text-slate-300 flex items-center justify-center text-lg font-bold">&times;</button>
            </div>
            <div class="grid grid-cols-2 gap-3" id="modules-grid-target"></div>
        </div>
    </div>

    <script>
        const AppState = {
            authenticated: false,
            activeView: 'login',
            cartCount: 0,
            registeredBloodDonor: false,
            sosActive: false,
            healthScore: 94,
            waterIntake: 1200, // New Mobile Vitals Metric Feature
            vitalsHistory: { heartRate: 72, bp: "120/80" },
            insuranceClaims: [
                { id: "CLM-9021", type: "In-Patient Care", cost: "$4,200", status: "Approved" },
                { id: "CLM-1149", type: "Pediatric Out-Patient", cost: "$380", status: "Processing" }
            ],
            charityImpact: { fundsRaised: 142090, livesImpacted: 842 }
        };

        const modules = [
            { id: 'dashboard', name: 'Patient Hub Node', icon: 'fa-columns', desc: 'Core matrix parameters hub.', color: 'from-amber-500 to-orange-600' },
            { id: 'consultation', name: 'Tele-Consultation', icon: 'fa-user-doctor', desc: 'Secure WebRTC consultation pipelines.', color: 'from-blue-500 to-indigo-600' },
            { id: 'ambulance', name: 'Ambulance System', icon: 'fa-truck-medical', desc: 'Zero latency dispatch engines.', color: 'from-red-500 to-rose-600' },
            { id: 'pharmacy', name: 'E-Pharmacy Deliveries', icon: 'fa-capsules', desc: 'Autonomous catalog matrix processing.', color: 'from-emerald-500 to-teal-600' },
            { id: 'hospitals', name: 'Bed Registry Node', icon: 'fa-hospital', desc: 'Structural telemetry mapping.', color: 'from-cyan-500 to-blue-600' },
            { id: 'blood-bank', name: 'Blood Bank Hub', icon: 'fa-droplet', desc: 'Cross-matching distributed ledgers.', color: 'from-rose-600 to-red-700' },
            { id: 'ai-assistant', name: 'HoneyAI Diagnostic', icon: 'fa-brain', desc: 'Analytical deep inference networking.', color: 'from-purple-500 to-fuchsia-600' },
            { id: 'records', name: 'Health Record Vault', icon: 'fa-folder-open', desc: 'Cryptographically locked history profile.', color: 'from-slate-500 to-slate-700' },
            { id: 'insurance', name: 'Insurance Portal', icon: 'fa-shield-halved', desc: 'Instant coverage tracking assessment.', color: 'from-teal-600 to-cyan-700' },
            { id: 'charity', name: 'Mutual Aid Charity', icon: 'fa-hand-holding-heart', desc: 'Traceable deployment humanitarian funding.', color: 'from-pink-500 to-rose-500' },
            { id: 'women-child', name: 'Women & Child Care', icon: 'fa-baby-carriage', desc: 'Milestone tracking logging telemetry.', color: 'from-purple-400 to-pink-600' },
            { id: 'senior-care', name: 'Senior Citizen Care', icon: 'fa-person-cane', desc: 'Fallback safety alert verification protocols.', color: 'from-amber-600 to-yellow-700' },
            { id: 'mental-health', name: 'Mental Health Engine', icon: 'fa-heart-pulse', desc: 'Stress metrics behavioral modeling framework.', color: 'from-sky-400 to-indigo-500' },
            { id: 'organ-donation', name: 'Organ Matching Node', icon: 'fa-dna', desc: 'Regulatory prioritized allocation index.', color: 'from-emerald-600 to-green-700' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            renderModulesGrid();
            navigateTo(AppState.authenticated ? 'dashboard' : 'login');
        });

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `glassmorphism border p-3.5 rounded-xl shadow-premium transition-all duration-300 transform translate-y-[-10px] opacity-0 flex items-start gap-3 pointer-events-auto w-full ${
                type === 'danger' ? 'bg-red-950/95 border-red-500/40 text-red-200' : 'bg-slate-950/95 border-brand/30 text-white'
            }`;
            
            const icon = type === 'danger' ? 'fa-triangle-exclamation text-red-400' : 'fa-circle-check text-brand';
            toast.innerHTML = `
                <i class="fa-solid ${icon} mt-0.5 text-base"></i>
                <div class="flex-1">
                    <h5 class="font-bold text-xs tracking-wide uppercase">${title}</h5>
                    <p class="text-[11px] text-slate-400 mt-0.5 leading-tight">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-[-10px]', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3500);
        }

        function logout() {
            AppState.authenticated = false;
            document.getElementById('user-profile-widget').classList.add('hidden');
            document.getElementById('app-dock').classList.remove('flex');
            document.getElementById('app-dock').classList.add('hidden');
            showToast('Session Expired', 'Securely logged out from instance routing matrices.', 'success');
            navigateTo('login');
        }

        function triggerGlobalSOS() {
            AppState.sosActive = true;
            document.getElementById('active-sos-banner').classList.remove('hidden');
            showToast('EMERGENCY SOS INITIATED', 'Transmitting precise real-time hardware tracking telemetry packets to active responders.', 'danger');
        }

        function cancelSOS() {
            AppState.sosActive = false;
            document.getElementById('active-sos-banner').classList.add('hidden');
            showToast('SOS Stand Down', 'Emergency vectors reset.', 'success');
        }

        function openMoreModulesMenu() {
            const drawer = document.getElementById('more-modules-modal');
            drawer.classList.remove('hidden');
            setTimeout(() => { drawer.classList.remove('opacity-0'); }, 10);
        }

        function closeMoreModulesMenu() {
            const drawer = document.getElementById('more-modules-modal');
            drawer.classList.add('opacity-0');
            setTimeout(() => { drawer.classList.add('hidden'); }, 300);
        }

        function renderModulesGrid() {
            const target = document.getElementById('modules-grid-target');
            target.innerHTML = modules.map(m => `
                <div onclick="navigateTo('${m.id}'); closeMoreModulesMenu();" class="bg-slate-900/90 border border-slate-800 active:border-brand/50 p-3.5 rounded-xl transition flex flex-col justify-between min-h-[110px]">
                    <div class="h-8 w-8 rounded-lg bg-gradient-to-tr ${m.color} flex items-center justify-center text-white text-sm shadow mb-2">
                        <i class="fa-solid ${m.icon}"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-xs text-slate-100">${m.name}</h4>
                        <p class="text-[10px] text-slate-400 mt-0.5 line-clamp-1">${m.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateDockHighlighter(viewId) {
            document.querySelectorAll('#app-dock button').forEach(btn => {
                if(btn.getAttribute('onclick')?.includes(`'${viewId}'`)) {
                    btn.className = "flex flex-col items-center gap-1 py-2 px-2.5 text-brand bg-slate-900 border border-slate-800/80 shadow-inner scale-105 rounded-xl flex-1 transition-all";
                } else {
                    btn.className = "flex flex-col items-center gap-1 py-2 px-2.5 text-slate-400 hover:text-slate-300 rounded-xl flex-1 transition-all";
                }
            });
        }

        function trackHydration() {
            AppState.waterIntake += 250;
            document.getElementById('water-counter-display').innerText = `${AppState.waterIntake} mL`;
            showToast('Hydration Logged', '+250mL structural water matrix logged.', 'success');
        }

        function navigateTo(viewId) {
            AppState.activeView = viewId;
            const root = document.getElementById('view-root');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            updateDockHighlighter(viewId);

            if (!AppState.authenticated && viewId !== 'login') {
                navigateTo('login');
                return;
            }

            root.innerHTML = '';
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'view-slide-in space-y-4';

            switch(viewId) {
                case 'login': contentWrapper.innerHTML = getLoginTemplate(); break;
                case 'dashboard': contentWrapper.innerHTML = getDashboardTemplate(); break;
                case 'consultation': contentWrapper.innerHTML = getConsultationTemplate(); break;
                case 'ambulance': contentWrapper.innerHTML = getAmbulanceTemplate(); break;
                case 'pharmacy': contentWrapper.innerHTML = getPharmacyTemplate(); break;
                case 'hospitals': contentWrapper.innerHTML = getHospitalsTemplate(); break;
                case 'blood-bank': contentWrapper.innerHTML = getBloodBankTemplate(); break;
                case 'ai-assistant': contentWrapper.innerHTML = getAIAssistantTemplate(); break;
                case 'records': contentWrapper.innerHTML = getRecordsTemplate(); break;
                case 'insurance': contentWrapper.innerHTML = getInsuranceTemplate(); break;
                case 'charity': contentWrapper.innerHTML = getCharityTemplate(); break;
                case 'women-child': contentWrapper.innerHTML = getWomenChildTemplate(); break;
                case 'senior-care': contentWrapper.innerHTML = getSeniorCareTemplate(); break;
                case 'mental-health': contentWrapper.innerHTML = getMentalHealthTemplate(); break;
                case 'organ-donation': contentWrapper.innerHTML = getOrganDonationTemplate(); break;
                default: contentWrapper.innerHTML = `<div class="p-8 text-center text-slate-500">Core architecture node placeholder missing.</div>`;
            }
            root.appendChild(contentWrapper);
        }

        // ==========================================
        // UI RESPONSIVE TEMPLATE DEFINITIONS
        // ==========================================

        function getLoginTemplate() {
            return `
            <div class="py-8 px-2">
                <div class="glassmorphism bg-slate-950/40 border border-slate-800/80 p-6 rounded-2xl space-y-6 shadow-2xl relative overflow-hidden">
                    <div class="text-center">
                        <div class="inline-flex h-14 w-14 items-center justify-center rounded-xl bg-gradient-to-tr from-brand to-amber-500 shadow-neon mb-3">
                            <span class="text-2xl">🍯</span>
                        </div>
                        <h2 class="text-2xl font-black tracking-tight text-white">Ecosystem Framework Login</h2>
                        <p class="text-xs text-slate-400 mt-0.5">HoneyCare Production Operating System Platform</p>
                    </div>
                    <div class="bg-slate-900/90 border border-slate-800 p-3 rounded-xl text-[11px] space-y-0.5 font-mono">
                        <span class="block font-bold text-brand uppercase tracking-wider text-[10px]">Credential Core Matrix</span>
                        <div class="flex justify-between text-slate-400"><span>User ID: <b class="text-white">anusha</b></span> <span>Access Token: <b class="text-white">0501</b></span></div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold tracking-wider text-slate-400 uppercase mb-1">Node Identity Vector</label>
                            <input id="login-user" type="text" value="anusha" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-brand transition text-xs">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold tracking-wider text-slate-400 uppercase mb-1">Passcode Access Vector</label>
                            <input id="login-pass" type="password" value="0501" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-white focus:outline-none focus:border-brand transition text-xs tracking-widest">
                        </div>
                        <button onclick="handleLoginSubmit()" class="w-full bg-brand active:scale-[0.98] text-slate-950 font-extrabold py-3 px-4 rounded-xl text-xs uppercase tracking-wide shadow-lg shadow-brand/10 transition-all">
                            Verify & Synchronize Node
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function handleLoginSubmit() {
            if (document.getElementById('login-user').value === 'anusha' && document.getElementById('login-pass').value === '0501') {
                AppState.authenticated = true;
                document.getElementById('user-profile-widget').classList.remove('hidden');
                document.getElementById('user-profile-widget').classList.add('flex');
                document.getElementById('app-dock').classList.remove('hidden');
                document.getElementById('app-dock').classList.add('flex');
                showToast('Authentication Cleared', 'Access matrix initialization complete.', 'success');
                navigateTo('dashboard');
            } else {
                showToast('Authentication Failed', 'Identity mismatch parameters inside secure kernel rejection.', 'danger');
            }
        }

        function getDashboardTemplate() {
            return `
            <div class="bg-gradient-to-br from-slate-950 to-slate-900 border border-slate-800/80 p-5 rounded-2xl shadow-xl">
                <span class="text-[9px] font-bold text-brand uppercase tracking-widest">Ecosystem Core Operational Tier</span>
                <h1 class="text-xl font-black text-white mt-0.5">Welcome Back, Anusha</h1>
                <p class="text-[11px] text-slate-400 leading-tight mt-1">Biometric node telemetry processing: Nominal.</p>
                
                <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-800/60 font-mono text-center">
                    <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800">
                        <span class="block text-[9px] text-slate-500 uppercase font-bold">Health Vector</span>
                        <span class="text-base font-extrabold text-emerald-400">${AppState.healthScore}%</span>
                    </div>
                    <div class="bg-slate-950/60 p-2.5 rounded-xl border border-slate-800">
                        <span class="block text-[9px] text-slate-500 uppercase font-bold">Pulse Telemetry</span>
                        <span class="text-base font-extrabold text-brand">${AppState.vitalsHistory.heartRate} BPM</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-950/40 border border-slate-800 p-4 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="h-9 w-9 rounded-xl bg-blue-500/10 text-blue-400 flex items-center justify-center text-sm">
                        <i class="fa-solid fa-droplet"></i>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-200">Fluid Intake Logging</h4>
                        <span class="text-[10px] font-mono text-slate-400" id="water-counter-display">${AppState.waterIntake} mL</span>
                    </div>
                </div>
                <button onclick="trackHydration()" class="bg-slate-800 text-slate-200 active:bg-brand active:text-slate-950 px-3 py-1.5 rounded-xl text-[10px] font-bold transition">
                    + 250mL Log
                </button>
            </div>

            <div class="bg-slate-950/30 border border-slate-800/80 rounded-2xl p-4">
                <h3 class="text-xs font-bold text-white mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-bell text-brand"></i> Chronological Medication Sequences
                </h3>
                <div class="space-y-2.5">
                    <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-xl border border-slate-800/40">
                        <div class="flex items-center gap-2.5">
                            <span class="text-base text-brand">💊</span>
                            <div>
                                <span class="block text-xs font-bold text-slate-200">Metformin 500mg</span>
                                <span class="block text-[10px] text-slate-400">Post Breakfast Scheduling Block</span>
                            </div>
                        </div>
                        <button onclick="showToast('Log Saved', 'Metformin dosage cycle verified.')" class="text-[10px] bg-slate-800 text-slate-300 px-2.5 py-1.5 rounded-lg font-bold">Log</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-950/40 border border-slate-800 p-4 rounded-2xl space-y-2">
                <h3 class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Synchronized Dependents Telemetry</h3>
                <div class="flex justify-between items-center text-xs">
                    <span class="text-slate-300"><i class="fa-solid fa-circle-user text-slate-500 mr-1.5"></i>Father (Rajesh Kumar)</span>
                    <span class="px-2 py-0.5 bg-emerald-950/80 text-emerald-400 text-[9px] rounded-md font-mono border border-emerald-500/20">Stable</span>
                </div>

            chatBox.innerHTML += `

                    ${txt}

            el.value = '';
            
            setTimeout(() => {
                chatBox.innerHTML += `
